<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="鐧诲綍灞辩伀瀛︿範璧勬枡绔欙紝鏀惰棌鍜岀鐞嗕綘鐨勫涔犲唴瀹广€?>
  <title>鐧诲綍 | 灞辩伀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-intro">
      <a class="brand-mark" href="/">灞辩伀瀛︿範绔?/a>
      <h1>鎶婇浂鏁ｇ殑鐭ヨ瘑锛?br><em>鐐规垚涓€绨囩伀銆?/em></h1>
      <p>涓€涓粰瀛︾敓鍑嗗鐨勮交閲忓涔犺祫鏂欑珯銆傜櫥褰曞悗锛屾垜浠細閫愭鍔犲叆鏀惰棌銆佸涔犺繘搴﹀拰閿欓璁板綍銆?/p>
    </section>

    <section class="auth-card" aria-label="璐﹀彿鐧诲綍涓庢敞鍐?>
      <div id="config-warning" class="config-warning" hidden>婕旂ず椤甸潰宸插畬鎴愶紝浣嗙櫥褰曟湇鍔¤繕鏈繛鎺ャ€傜珯闀块厤缃?Supabase 鍚庡嵆鍙湡瀹炴敞鍐屻€?/div>
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab is-active" data-tab="login" type="button">鐧诲綍</button>
        <button class="auth-tab" data-tab="register" type="button">娉ㄥ唽</button>
      </div>

      <form id="login-form" class="auth-panel">
        <div class="field"><label for="login-email">閭</label><input id="login-email" type="email" autocomplete="email" placeholder="name@example.com" required></div>
        <div class="field"><label for="login-password">瀵嗙爜</label><input id="login-password" type="password" autocomplete="current-password" minlength="8" placeholder="鑷冲皯 8 浣? required></div>
        <button class="primary-button" type="submit">鐧诲綍</button>
        <button id="reset-button" class="text-button" type="button">蹇樿瀵嗙爜锛熷彂閫侀噸缃偖浠?/button>
        <p id="login-note" class="form-note" aria-live="polite"></p>
      </form>

      <form id="register-form" class="auth-panel" hidden>
        <div class="field"><label for="register-email">閭</label><input id="register-email" type="email" autocomplete="email" placeholder="name@example.com" required></div>
        <div class="field"><label for="register-password">璁剧疆瀵嗙爜</label><input id="register-password" type="password" autocomplete="new-password" minlength="8" placeholder="鑷冲皯 8 浣? required></div>
        <button class="primary-button" type="submit">鍒涘缓璐﹀彿</button>
        <p id="register-note" class="form-note" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module">
    import { getSession, sendPasswordReset, signIn, signUp } from "/assets/js/auth.js";
    import { isSupabaseConfigured } from "/assets/js/supabase-config.js";

    const tabs = document.querySelectorAll(".auth-tab");
    const panels = { login: document.querySelector("#login-form"), register: document.querySelector("#register-form") };
    const setNote = (id, message, isError = false) => {
      const note = document.querySelector(id);
      note.textContent = message;
      note.classList.toggle("is-error", isError);
    };
    const friendlyError = (error) => {
      const message = error?.message || "鎿嶄綔澶辫触锛岃绋嶅悗閲嶈瘯銆?;
      if (message.includes("Invalid login credentials")) return "閭鎴栧瘑鐮佷笉姝ｇ‘銆?;
      if (message.includes("already registered")) return "杩欎釜閭宸茬粡娉ㄥ唽杩囦簡銆?;
      if (message.includes("Password should")) return "瀵嗙爜鑷冲皯闇€瑕?8 浣嶃€?;
      return message;
    };

    if (!isSupabaseConfigured) document.querySelector("#config-warning").hidden = false;
    if (await getSession()) window.location.replace("/account.html");

    tabs.forEach((tab) => tab.addEventListener("click", () => {
      tabs.forEach((item) => item.classList.toggle("is-active", item === tab));
      Object.entries(panels).forEach(([name, panel]) => { panel.hidden = name !== tab.dataset.tab; });
    }));

    panels.login.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      setNote("#login-note", "姝ｅ湪鐧诲綍...");
      try {
        await signIn(document.querySelector("#login-email").value.trim(), document.querySelector("#login-password").value);
        window.location.replace("/account.html");
      } catch (error) {
        setNote("#login-note", friendlyError(error), true);
      } finally { button.disabled = false; }
    });

    panels.register.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      setNote("#register-note", "姝ｅ湪鍒涘缓璐﹀彿...");
      try {
        const result = await signUp(document.querySelector("#register-email").value.trim(), document.querySelector("#register-password").value);
        setNote("#register-note", result.session ? "娉ㄥ唽鎴愬姛锛屾鍦ㄨ繘鍏ヨ处鍙烽〉..." : "娉ㄥ唽鎴愬姛锛岃鍘婚偖绠辩偣鍑荤‘璁ら摼鎺ャ€?);
        if (result.session) window.location.replace("/account.html");
      } catch (error) {
        setNote("#register-note", friendlyError(error), true);
      } finally { button.disabled = false; }
    });

    document.querySelector("#reset-button").addEventListener("click", async () => {
      const email = document.querySelector("#login-email").value.trim();
      if (!email) return setNote("#login-note", "璇峰厛濉啓閭銆?, true);
      try {
        await sendPasswordReset(email);
        setNote("#login-note", "閲嶇疆閭欢宸插彂閫侊紝璇锋鏌ラ偖绠便€傚嵆浣胯处鍙蜂笉瀛樺湪锛屾垜浠篃涓嶄細鍏紑鎻愮ず銆?);
      } catch (error) { setNote("#login-note", friendlyError(error), true); }
    });
  </script>
<script type="module" src="/assets/js/site-account.js"></script>
</body>
</html>
