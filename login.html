<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="登录山火学习资料站，收藏和管理你的学习内容。">
  <title>登录 | 山火</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-intro">
      <a class="brand-mark" href="/">山火学习站</a>
      <h1>把零散的知识，<br><em>点成一簇火。</em></h1>
      <p>一个给学生准备的轻量学习资料站。登录后，我们会逐步加入收藏、学习进度和错题记录。</p>
    </section>

    <section class="auth-card" aria-label="账号登录与注册">
      <div id="config-warning" class="config-warning" hidden>演示页面已完成，但登录服务还未连接。站长配置 Supabase 后即可真实注册。</div>
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab is-active" data-tab="login" type="button">登录</button>
        <button class="auth-tab" data-tab="register" type="button">注册</button>
      </div>

      <form id="login-form" class="auth-panel">
        <div class="field"><label for="login-email">邮箱</label><input id="login-email" type="email" autocomplete="email" placeholder="name@example.com" required></div>
        <div class="field"><label for="login-password">密码</label><input id="login-password" type="password" autocomplete="current-password" minlength="8" placeholder="至少 8 位" required></div>
        <button class="primary-button" type="submit">登录</button>
        <button id="reset-button" class="text-button" type="button">忘记密码？发送重置邮件</button>
        <p id="login-note" class="form-note" aria-live="polite"></p>
      </form>

      <form id="register-form" class="auth-panel" hidden>
        <div class="field"><label for="register-email">邮箱</label><input id="register-email" type="email" autocomplete="email" placeholder="name@example.com" required></div>
        <div class="field"><label for="register-password">设置密码</label><input id="register-password" type="password" autocomplete="new-password" minlength="8" placeholder="至少 8 位" required></div>
        <button class="primary-button" type="submit">创建账号</button>
        <p id="register-note" class="form-note" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module">
    import { getSession, sendPasswordReset, signIn, signUp } from "/assets/js/auth.js";
    import { isSupabaseConfigured } from "/assets/js/supabase-config.js";

    const tabs = document.querySelectorAll(".auth-tab");
    const panels = { login: document.querySelector("#login-form"), register: document.querySelector("#register-form") };
    const setNote = (id, message, isError = false) => {
      const note = document.querySelector(id);
      note.textContent = message;
      note.classList.toggle("is-error", isError);
    };
    const friendlyError = (error) => {
      const message = error?.message || "操作失败，请稍后重试。";
      if (message.includes("Invalid login credentials")) return "邮箱或密码不正确。";
      if (message.includes("already registered")) return "这个邮箱已经注册过了。";
      if (message.includes("Password should")) return "密码至少需要 8 位。";
      return message;
    };

    if (!isSupabaseConfigured) document.querySelector("#config-warning").hidden = false;
    if (await getSession()) window.location.replace("/account.html");

    tabs.forEach((tab) => tab.addEventListener("click", () => {
      tabs.forEach((item) => item.classList.toggle("is-active", item === tab));
      Object.entries(panels).forEach(([name, panel]) => { panel.hidden = name !== tab.dataset.tab; });
    }));

    panels.login.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      setNote("#login-note", "正在登录...");
      try {
        await signIn(document.querySelector("#login-email").value.trim(), document.querySelector("#login-password").value);
        window.location.replace("/account.html");
      } catch (error) {
        setNote("#login-note", friendlyError(error), true);
      } finally { button.disabled = false; }
    });

    panels.register.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      setNote("#register-note", "正在创建账号...");
      try {
        const result = await signUp(document.querySelector("#register-email").value.trim(), document.querySelector("#register-password").value);
        setNote("#register-note", result.session ? "注册成功，正在进入账号页..." : "注册成功，请去邮箱点击确认链接。");
        if (result.session) window.location.replace("/account.html");
      } catch (error) {
        setNote("#register-note", friendlyError(error), true);
      } finally { button.disabled = false; }
    });

    document.querySelector("#reset-button").addEventListener("click", async () => {
      const email = document.querySelector("#login-email").value.trim();
      if (!email) return setNote("#login-note", "请先填写邮箱。", true);
      try {
        await sendPasswordReset(email);
        setNote("#login-note", "重置邮件已发送，请检查邮箱。即使账号不存在，我们也不会公开提示。");
      } catch (error) { setNote("#login-note", friendlyError(error), true); }
    });
  </script>
<script type="module" src="/assets/js/site-account.js"></script>
</body>
</html>
