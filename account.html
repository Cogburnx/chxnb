<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的账号 | 山火</title>
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-intro">
      <a class="brand-mark" href="/">山火学习站</a>
      <h1>个人设置<br><em>更顺眼、更像你</em></h1>
      <p>这里可以管理你的账号信息。登录、注册逻辑保持不变，仅增加个性化资料设置与浅蓝色视觉升级。</p>
    </section>

    <section class="auth-card" aria-label="账号设置">
      <h2>我的账号</h2>
      <p id="account-email" class="form-note">正在读取账号...</p>

      <form id="profile-form" class="account-section">
        <div class="avatar-row">
          <img id="avatar-preview" class="avatar-preview" alt="头像预览">
          <input id="avatar-file" class="input-file" type="file" accept="image/*">
        </div>
        <div class="field">
          <label for="display-name">昵称</label>
          <input id="display-name" type="text" maxlength="24" placeholder="输入你想显示的名字">
        </div>
        <div class="field">
          <label for="avatar-url">头像链接（可选）</label>
          <input id="avatar-url" type="url" placeholder="https://...">
        </div>
        <button class="primary-button" type="submit">保存个性化设置</button>
        <p id="profile-note" class="form-note" aria-live="polite"></p>
      </form>

      <form id="password-form" class="account-section" hidden>
        <div class="field">
          <label for="new-password">设置新密码</label>
          <input id="new-password" type="password" minlength="8" autocomplete="new-password" required>
        </div>
        <button class="primary-button" type="submit">更新密码</button>
        <p id="password-note" class="form-note" aria-live="polite"></p>
      </form>

      <button id="logout-button" class="primary-button" type="button">退出登录</button>
    </section>
  </main>

  <script type="module">
    import { getSession, signOut, supabase } from "/assets/js/auth.js";

    const session = await getSession();
    if (!session) {
      window.location.replace("/login.html");
    }

    const user = session.user;
    const meta = user.user_metadata || {};
    const emailLabel = document.querySelector("#account-email");
    const displayNameInput = document.querySelector("#display-name");
    const avatarUrlInput = document.querySelector("#avatar-url");
    const avatarPreview = document.querySelector("#avatar-preview");
    const avatarFileInput = document.querySelector("#avatar-file");

    function fallbackAvatar(name) {
      const initial = (name || "火").trim().slice(0, 1) || "火";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96"><rect width="96" height="96" rx="48" fill="#4da3ff"/><text x="48" y="58" text-anchor="middle" font-size="42" font-family="Arial" font-weight="700" fill="#fff">${initial}</text></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function currentName() {
      return displayNameInput.value.trim() || user.email || "山火用户";
    }

    function refreshPreview() {
      const url = avatarUrlInput.value.trim();
      avatarPreview.src = url || fallbackAvatar(currentName());
    }

    emailLabel.textContent = user.email || "已登录";
    displayNameInput.value = meta.display_name || "";
    avatarUrlInput.value = meta.avatar_url || "";
    refreshPreview();

    avatarUrlInput.addEventListener("input", refreshPreview);
    displayNameInput.addEventListener("input", refreshPreview);

    avatarFileInput.addEventListener("change", () => {
      const file = avatarFileInput.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        if (typeof reader.result === "string") {
          avatarUrlInput.value = reader.result;
          refreshPreview();
        }
      };
      reader.readAsDataURL(file);
    });

    document.querySelector("#profile-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const note = document.querySelector("#profile-note");
      const button = event.submitter;
      button.disabled = true;
      note.classList.remove("is-error");
      note.textContent = "正在保存...";

      const data = {
        display_name: displayNameInput.value.trim(),
        avatar_url: avatarUrlInput.value.trim(),
      };

      const { error } = await supabase.auth.updateUser({ data });
      if (error) {
        note.textContent = error.message;
        note.classList.add("is-error");
      } else {
        note.textContent = "保存成功，右上角头像和名字会自动更新。";
      }
      button.disabled = false;
    });

    if (new URLSearchParams(location.search).has("reset")) {
      document.querySelector("#password-form").hidden = false;
    }

    document.querySelector("#password-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const note = document.querySelector("#password-note");
      const { error } = await supabase.auth.updateUser({ password: document.querySelector("#new-password").value });
      note.textContent = error ? error.message : "密码已更新。";
      note.classList.toggle("is-error", Boolean(error));
    });

    document.querySelector("#logout-button").addEventListener("click", async () => {
      await signOut();
      window.location.replace("/");
    });
  </script>
</body>
</html>
