<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鎴戠殑璐﹀彿 | 灞辩伀</title>
  <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-intro">
      <a class="brand-mark" href="/">灞辩伀瀛︿範绔?/a>
      <h1>涓汉璁剧疆<br><em>鏇撮『鐪笺€佹洿鍍忎綘</em></h1>
      <p>杩欓噷鍙互绠＄悊浣犵殑璐﹀彿淇℃伅銆傜櫥褰曘€佹敞鍐岄€昏緫淇濇寔涓嶅彉锛屼粎澧炲姞涓€у寲璧勬枡璁剧疆涓庢祬钃濊壊瑙嗚鍗囩骇銆?/p>
    </section>

    <section class="auth-card" aria-label="璐﹀彿璁剧疆">
      <h2>鎴戠殑璐﹀彿</h2>
      <p id="account-email" class="form-note">姝ｅ湪璇诲彇璐﹀彿...</p>

      <form id="profile-form" class="account-section">
        <div class="avatar-row">
          <img id="avatar-preview" class="avatar-preview" alt="澶村儚棰勮">
          <input id="avatar-file" class="input-file" type="file" accept="image/*">
        </div>
        <div class="field">
          <label for="display-name">鏄电О</label>
          <input id="display-name" type="text" maxlength="24" placeholder="杈撳叆浣犳兂鏄剧ず鐨勫悕瀛?>
        </div>
        <div class="field">
          <label for="avatar-url">澶村儚閾炬帴锛堝彲閫夛級</label>
          <input id="avatar-url" type="url" placeholder="https://...">
        </div>
        <button class="primary-button" type="submit">淇濆瓨涓€у寲璁剧疆</button>
        <p id="profile-note" class="form-note" aria-live="polite"></p>
      </form>

      <form id="password-form" class="account-section" hidden>
        <div class="field">
          <label for="new-password">璁剧疆鏂板瘑鐮?/label>
          <input id="new-password" type="password" minlength="8" autocomplete="new-password" required>
        </div>
        <button class="primary-button" type="submit">鏇存柊瀵嗙爜</button>
        <p id="password-note" class="form-note" aria-live="polite"></p>
      </form>

      <button id="logout-button" class="primary-button" type="button">閫€鍑虹櫥褰?/button>
    </section>
  </main>

  <script type="module">
    import { getSession, signOut, supabase } from "/assets/js/auth.js?v=20260707-fix5";

    const MAX_AVATAR_FILE_SIZE = 2 * 1024 * 1024;
    const MAX_AVATAR_DATA_URL_LENGTH = 500000;
    const AVATAR_OUTPUT_SIZE = 256;

    const session = await getSession();
    if (!session) {
      window.location.replace("/login.html");
      throw new Error("No active session");
    }

    const user = session.user;
    const meta = user.user_metadata || {};
    const emailLabel = document.querySelector("#account-email");
    const displayNameInput = document.querySelector("#display-name");
    const avatarUrlInput = document.querySelector("#avatar-url");
    const avatarPreview = document.querySelector("#avatar-preview");
    const avatarFileInput = document.querySelector("#avatar-file");
    const profileNote = document.querySelector("#profile-note");

    function fallbackAvatar(name) {
      const initial = (name || "鐏?).trim().slice(0, 1) || "鐏?;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96"><rect width="96" height="96" rx="48" fill="#4da3ff"/><text x="48" y="58" text-anchor="middle" font-size="42" font-family="Arial" font-weight="700" fill="#fff">${initial}</text></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function currentName() {
      return displayNameInput.value.trim() || user.email || "灞辩伀鐢ㄦ埛";
    }

    function setProfileNote(message, isError = false) {
      profileNote.textContent = message;
      profileNote.classList.toggle("is-error", isError);
    }

    function refreshPreview() {
      const url = avatarUrlInput.value.trim();
      avatarPreview.src = url || fallbackAvatar(currentName());
    }

    async function fileToSizedDataUrl(file) {
      if (!file.type.startsWith("image/")) {
        throw new Error("璇蜂笂浼犲浘鐗囨牸寮忔枃浠?);
      }
      if (file.size > MAX_AVATAR_FILE_SIZE) {
        throw new Error("澶村儚鏂囦欢涓嶈兘瓒呰繃 2MB");
      }

      const src = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(new Error("璇诲彇澶村儚鏂囦欢澶辫触"));
        reader.readAsDataURL(file);
      });

      const img = await new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("澶村儚鏂囦欢鏃犳晥"));
        image.src = src;
      });

      const side = Math.min(img.naturalWidth, img.naturalHeight);
      const sx = Math.max(0, (img.naturalWidth - side) / 2);
      const sy = Math.max(0, (img.naturalHeight - side) / 2);

      const canvas = document.createElement("canvas");
      canvas.width = AVATAR_OUTPUT_SIZE;
      canvas.height = AVATAR_OUTPUT_SIZE;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, sx, sy, side, side, 0, 0, AVATAR_OUTPUT_SIZE, AVATAR_OUTPUT_SIZE);

      return canvas.toDataURL("image/jpeg", 0.86);
    }

    emailLabel.textContent = user.email || "宸茬櫥褰?;
    displayNameInput.value = meta.display_name || "";
    avatarUrlInput.value = meta.avatar_url || "";
    refreshPreview();

    avatarUrlInput.addEventListener("input", refreshPreview);
    displayNameInput.addEventListener("input", refreshPreview);
    avatarPreview.addEventListener("error", () => {
      avatarPreview.src = fallbackAvatar(currentName());
    });

    avatarFileInput.addEventListener("change", async () => {
      const file = avatarFileInput.files?.[0];
      if (!file) return;

      try {
        setProfileNote("姝ｅ湪澶勭悊澶村儚...");
        const dataUrl = await fileToSizedDataUrl(file);
        avatarUrlInput.value = dataUrl;
        refreshPreview();
        setProfileNote("澶村儚宸插鐞嗕负 256x256锛屽苟闄愬埗鏄剧ず澶у皬銆?, false);
      } catch (error) {
        setProfileNote(error.message || "澶村儚澶勭悊澶辫触", true);
      }
    });

    document.querySelector("#profile-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      setProfileNote("姝ｅ湪淇濆瓨...");

      const avatarValue = avatarUrlInput.value.trim();
      if (avatarValue.startsWith("data:") && avatarValue.length > MAX_AVATAR_DATA_URL_LENGTH) {
        setProfileNote("澶村儚鏁版嵁杩囧ぇ锛岃鎹㈡洿灏忕殑鍥剧墖銆?, true);
        button.disabled = false;
        return;
      }

      const data = {
        display_name: displayNameInput.value.trim(),
        avatar_url: avatarValue,
      };

      const { error } = await supabase.auth.updateUser({ data });
      if (error) {
        setProfileNote(error.message, true);
      } else {
        setProfileNote("淇濆瓨鎴愬姛锛屽彸涓婅澶村儚鍜屽悕瀛椾細鑷姩鏇存柊銆?, false);
      }
      button.disabled = false;
    });

    if (new URLSearchParams(location.search).has("reset")) {
      document.querySelector("#password-form").hidden = false;
    }

    document.querySelector("#password-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const note = document.querySelector("#password-note");
      const { error } = await supabase.auth.updateUser({ password: document.querySelector("#new-password").value });
      note.textContent = error ? error.message : "瀵嗙爜宸叉洿鏂般€?;
      note.classList.toggle("is-error", Boolean(error));
    });

    const logoutButton = document.querySelector("#logout-button");
    logoutButton.addEventListener("click", async () => {
      logoutButton.disabled = true;
      setProfileNote("姝ｅ湪閫€鍑虹櫥褰?..");

      try {
        await signOut();
      } catch {
        // Fallback: clear local auth state even if remote sign-out fails.
        try { await supabase.auth.signOut({ scope: "local" }); } catch {}
        try {
          Object.keys(localStorage)
            .filter((key) => key.startsWith("sb-"))
            .forEach((key) => localStorage.removeItem(key));
        } catch {}
      }

      window.location.replace("/login.html?logout=1");
    });
  </script>
  <script type="module" src="/assets/js/site-account.js"></script>
</body>
</html>
