    /* 理科按钮 (原初中位置) 改用科技蓝绿色调 */

    }

  <script>
    // ---------- 分类展开/折叠功能 (完全相同) ----------
    function toggleCategory(categoryId) {
      const content = document.getElementById(categoryId);
      const icon = content.previousElementSibling.querySelector('.expand-icon');
      
      if (content.style.display === 'block') {
        content.style.display = 'none';
        icon.textContent = '+';
      } else {
        content.style.display = 'block';
        icon.textContent = '-';
      }
    }
    
    // 3. 粒子效果 (移植自第一个网页)
document.addEventListener('DOMContentLoaded', function() {
    // 如果手机访问，直接关掉粒子
    if (window.innerWidth < 768) return; 

    const canvas = document.getElementById('particle-container');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.8;      // 0.8 ~ 2.3
            this.speedX = Math.random() * 0.4 - 0.2;    // -0.2 ~ 0.2
            this.speedY = Math.random() * 0.4 - 0.2;
            this.color = '#555';
        }
        
        reset() {
            const edge = Math.floor(Math.random() * 4);
            switch(edge) {
                case 0: this.x = Math.random() * canvas.width; this.y = -10; break;
                case 1: this.x = canvas.width + 10; this.y = Math.random() * canvas.height; break;
                case 2: this.x = Math.random() * canvas.width; this.y = canvas.height + 10; break;
                case 3: this.x = -10; this.y = Math.random() * canvas.height; break;
            }
        }
        
        update(mouse) {
            if (mouse.x !== null && mouse.y !== null) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    const attraction = 0.02;
                    const angle = Math.atan2(dy, dx);
                    this.speedX += Math.cos(angle) * attraction;
                    this.speedY += Math.sin(angle) * attraction;
                }
            }
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) this.reset();
        }
        
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    const mouse = { x: null, y: null, radius: 150 };
    window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
    
    const particlesArray = [];
    const particleCount = 25; 
    
    function init() {
        for (let i = 0; i < particleCount; i++) particlesArray.push(new Particle());
    }
    
    function connectParticles() {
        for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a + 1; b < particlesArray.length; b++) {
                const dx = particlesArray[a].x - particlesArray[b].x;
                const dy = particlesArray[a].y - particlesArray[b].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) {
                    const opacity = 1 - (distance / 100);
                    ctx.strokeStyle = `rgba(80, 80, 80, ${opacity * 0.4})`;
                    ctx.lineWidth = 0.3;
                    ctx.beginPath();
                    ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                    ctx.stroke();
                }
            }
        }
    }
    
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particlesArray.forEach(p => { p.update(mouse); p.draw(); });
        connectParticles();
        requestAnimationFrame(animate);
    }
    init();
    animate();
});
  </script>
