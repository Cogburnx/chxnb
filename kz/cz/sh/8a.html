<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>山火 | 正在加载中</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 粒子背景容器 */
    #particle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #f4f4f7;
      z-index: -1;
    }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    /* 顶部导航 */
    .corner-nav {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 15px;
      z-index: 10;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.15);
      color: #2d3e50;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.95);
    }

    /* 主内容卡片 */
    .update-container {
      width: 90%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(15px);
      padding: 50px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .status-icon {
      font-size: 4rem;
      color: #6a4e9b;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 2.2rem;
      margin: 10px 0;
      color: #2d3e50;
    }

    p {
      color: #666;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    /* 进度条样式 */
    .progress-box {
      margin-top: 30px;
      width: 100%;
    }

    .progress-bar {
      height: 8px;
      width: 100%;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-fill {
      height: 100%;
      width: 65%; /* 模拟进度 */
      background: linear-gradient(90deg, #6a4e9b, #a88beb);
      border-radius: 10px;
      transition: width 1s ease-in-out;
    }

    .status-text {
      font-size: 0.9rem;
      color: #999;
      display: flex;
      justify-content: space-between;
    }

    /* 底部链接 */
    .footer-links {
      margin-top: 40px;
      font-size: 0.9rem;
    }

    .footer-links a {
      color: #6a4e9b;
      text-decoration: none;
      margin: 0 10px;
      opacity: 0.8;
    }

    .footer-links a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* 手机端适配 */
    @media (max-width: 600px) {
      .corner-nav { top: 15px; left: 15px; }
      .nav-btn { padding: 8px 16px; font-size: 0.9rem; }
      h1 { font-size: 1.6rem; }
      .update-container { padding: 35px 20px; }
    }
  </style>
</head>
<body>

  <canvas id="particle-container"></canvas>

  <div class="corner-nav">
    <a href="javascript:history.back()" class="nav-btn">
      <i class="fas fa-arrow-left"></i> 返回
    </a>
  </div>

  <div class="update-container">
    <div class="status-icon">
      <i class="fas fa-tools"></i>
    </div>
    <h1>内容待更新</h1>
    <p>该版块正在紧张地整理与上传中...<br>请先访问其他栏目或稍后再试。</p>
    
    <div class="progress-box">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="status-text">
        <span>更新进度：进行中</span>
        <span>65%</span>
      </div>
    </div>

    <div class="footer-links">
      <a href="/kz/cz/cz.html">返回首页</a>
      <span>|</span>
      <a href="/kz/xxs.html">去休闲室逛逛</a>
    </div>
  </div>

  <script>
    // 智能粒子背景 (复刻山火背景逻辑)
    document.addEventListener('DOMContentLoaded', function() {
      if (window.innerWidth < 768) return; 

      const canvas = document.getElementById('particle-container');
      const ctx = canvas.getContext('2d');
      
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 1.5 + 0.8;
          this.speedX = Math.random() * 0.4 - 0.2;
          this.speedY = Math.random() * 0.4 - 0.2;
          this.color = '#888';
        }
        
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
        }
        
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
        }
        
        draw() {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      
      const particlesArray = [];
      for (let i = 0; i < 30; i++) particlesArray.push(new Particle());
      
      function connectParticles() {
        for (let a = 0; a < particlesArray.length; a++) {
          for (let b = a + 1; b < particlesArray.length; b++) {
            const dx = particlesArray[a].x - particlesArray[b].x;
            const dy = particlesArray[a].y - particlesArray[b].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 120) {
              ctx.strokeStyle = `rgba(106, 78, 155, ${1 - (distance / 120)})`;
              ctx.lineWidth = 0.5;
              ctx.beginPath();
              ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
              ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
              ctx.stroke();
            }
          }
        }
      }
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particlesArray.forEach(p => { p.update(); p.draw(); });
        connectParticles();
        requestAnimationFrame(animate);
      }
      animate();
    });
  </script>
</body>
</html>
